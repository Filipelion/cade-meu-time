name: Build Release ZIP

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'release'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: echo "version=$(jq -r '.version' src/manifest.json)" >> $GITHUB_OUTPUT

      - name: Create ZIP
        run: cd src && zip -r "../MaiorDoNordeste_SportRecife-v${{ steps.version.outputs.version }}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaiorDoNordeste_SportRecife-v${{ steps.version.outputs.version }}
          path: MaiorDoNordeste_SportRecife-v${{ steps.version.outputs.version }}.zip
