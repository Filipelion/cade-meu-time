<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maior do Nordeste</title>
  <link rel="stylesheet" href="style.css">
  <!-- Link para a fonte "Roboto Condensed" no Google Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Condensed&display=swap">

</head>

<body>
  <div class="tabs">
    <div class="tab active" id="tab-games">Jogos</div>
    <div class="tab" id="tab-news">Notícias</div>
    <div class="tab" id="tab-videos">Vídeos</div>
  </div>

  <div class="content active" id="content-games">
    <div class="games-top-bar">
      <a href="https://ge.globo.com/pe/futebol/times/sport/agenda/#/encerrados" target="_blank" class="game-card-finished" title="Ver jogos encerrados">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-label="Ícone de calendário">
          <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11zm0-13H5V6h14v1z"/>
        </svg>
        <span class="game-card-finished-text">Jogos Encerrados</span>
      </a>
      <label class="theme-toggle" title="Alternar modo escuro">
        <input type="checkbox" id="dark-mode-toggle">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span id="toggle-label">Modo escuro</span>
      </label>
    </div>
    <div id="games-list"></div>
  </div>

  <div class="content" id="content-news">
    <div id="news-list">
      <a href="https://sportrecife.com.br/noticias/" target="_blank" class="news-card" title="Acessar site oficial">
        <img src="https://sportrecife.com.br/wp-content/uploads/2024/06/image14.png" class="news-icon">
        <span class="news-title">Sport Club do Recife</span>
      </a>
      <a href="https://ge.globo.com/pe/futebol/times/sport/" target="_blank" class="news-card" title="Acessar">
        <img src="https://s2-ge.glbimg.com/qAiq9Ny0KA4EmGK-aiRLQ8-y3-s=/0x0:2048x2048/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_bc8228b6673f488aa253bbcb03c80ec5/internal_photos/bs/2020/f/1/ctmjQ9SOypbLkmmJyMuw/ge.png" class="news-icon">
        <span class="news-title">Globo Esporte</span>
      </a>
      <a href="https://www.folhape.com.br/esportes/sport/" target="_blank" class="news-card" title="Acessar">
        <svg class="news-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-label="Jornal" fill="currentColor">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 12H7v-2h5v2zm5-4H7V9h10v2zm0-4H7V5h10v2z"/>
        </svg>
        <span class="news-title">FolhaPE</span>
      </a>

      <a href="https://jc.ne10.uol.com.br/esportes/sport" target="_blank" class="news-card" title="Acessar">
        <svg class="news-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-label="Jornal" fill="currentColor">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 12H7v-2h5v2zm5-4H7V9h10v2zm0-4H7V5h10v2z"/>
        </svg>
        <span class="news-title">JC</span>
      </a>
      <a href="https://meusport.com/" target="_blank" class="news-card" title="Acessar">
        <svg class="news-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-label="Website">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
        </svg>
        <span class="news-title">Meu Sport</span>
      </a>
    </div>
  </div>

  <div class="content" id="content-videos">
    <div id="videos-list">
      <a href="https://www.youtube.com/@tvsportrecife/videos?view=0&sort=dd&shelf_id=1" target="_blank" class="video-card" title="Acessar">
        <svg class="video-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-label="YouTube">
          <path d="M21.58 7.19c-.23-.86-.91-1.54-1.77-1.77C18.25 5 12 5 12 5s-6.25 0-7.81.42c-.86.23-1.54.91-1.77 1.77C2 8.75 2 12 2 12s0 3.25.42 4.81c.23.86.91 1.54 1.77 1.77C5.75 19 12 19 12 19s6.25 0 7.81-.42c.86-.23 1.54-.91 1.77-1.77C22 15.25 22 12 22 12s0-3.25-.42-4.81zM10 15V9l5.2 3-5.2 3z"/>
        </svg>
        <span class="video-title">/TVSport</span>
      </a>
      <a href="https://ge.globo.com/pe/futebol/times/sport/videos/" target="_blank" class="video-card" title="Acessar">
        <img src="https://s2-ge.glbimg.com/qAiq9Ny0KA4EmGK-aiRLQ8-y3-s=/0x0:2048x2048/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_bc8228b6673f488aa253bbcb03c80ec5/internal_photos/bs/2020/f/1/ctmjQ9SOypbLkmmJyMuw/ge.png" class="video-icon">
        <span class="video-title">Globo Esporte</span>
      </a>
      <a href="https://www.instagram.com/sportrecife/" target="_blank" class="video-card" title="Acessar">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Instagram_icon.png/600px-Instagram_icon.png" class="video-icon">
        <span class="video-title">@sportrecife</span>
      </a>
    </div>
  </div>

<script src="background.js"></script>

</body>

</html>
